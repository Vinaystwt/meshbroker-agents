<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <rect width="600" height="120" fill="#000000"/>

  <!-- 3x3 dot grid icon, origin at (32, 36) with 14px spacing -->
  <!-- Row 1: dots at (32,36) (46,36) (60,36) -->
  <!-- Row 2: dots at (32,50) (46,50) (60,50) -->
  <!-- Row 3: dots at (32,64) (46,64) (60,64) -->

  <!-- white 30% opacity dots -->
  <circle cx="32" cy="36" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
  <circle cx="60" cy="36" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
  <circle cx="32" cy="50" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
  <circle cx="60" cy="50" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
  <circle cx="32" cy="64" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
  <circle cx="60" cy="64" r="3" fill="#FFFFFF" fill-opacity="0.3"/>

  <!-- #00d4ff accent dots: center + top-right + bottom-left diagonals -->
  <circle cx="46" cy="50" r="3" fill="#00d4ff"/>
  <circle cx="60" cy="36" r="3" fill="#00d4ff"/>
  <circle cx="32" cy="64" r="3" fill="#00d4ff"/>

  <!-- Wordmark -->
  <text
    x="88"
    y="67"
    font-family="'Helvetica Neue','Arial',sans-serif"
    font-size="42"
    font-weight="600"
    letter-spacing="0.15em"
    fill="#FFFFFF"
  >MESHBROKER</text>
</svg>
