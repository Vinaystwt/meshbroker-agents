<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeshBroker Composer v2</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0f1e; --surface:#111827; --border:#1f2d45; --accent:#3b82f6; --green:#10b981; --text:#e2e8f0; --muted:#64748b; --font:'Courier New',monospace; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); padding:32px; max-width:800px; margin:0 auto; }
    h1 { font-size:22px; color:var(--accent); letter-spacing:2px; text-align:center; }
    .edition { font-size:10px; color:var(--muted); text-align:center; margin-bottom:32px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:20px; }
    label { font-size:11px; color:var(--muted); display:block; margin-bottom:8px; margin-top:12px; }
    textarea, input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; color:var(--text); font-family:var(--font); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .privacy-note { font-size:10px; color:var(--green); background:rgba(16,185,129,0.1); padding:8px; border-radius:4px; margin-top:8px; }
    .btn { background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; width:100%; margin-top:20px; font-weight:bold; }
    .status-msg { font-size:12px; padding:10px; border-radius:6px; margin-top:12px; display:none; background:rgba(59,130,246,0.1); color:var(--accent); border:1px solid var(--accent); }
    .success-msg { font-size:12px; padding:10px; border-radius:6px; margin-top:12px; display:none; background:rgba(16,185,129,0.1); color:var(--green); border:1px solid var(--green); }
  </style>
</head>
<body>
<h1>MESH BROKER COMPOSER v2</h1>
<div class="edition">2026 EDITION // NATURAL LANGUAGE → X LAYER SLA</div>
<div class="card">
  <label>Task Description (English)</label>
  <textarea id="taskInput">Write a poem on India</textarea>
  <div class="row">
    <div><label>Payment (USDT)</label><input type="number" value="10"/></div>
    <div><label>Deadline (Mins)</label><input type="number" value="30"/></div>
  </div>
  <label>Anthropic API Key</label>
  <input type="password" value="sk-ant-hackathon-demo-key"/>
  <div class="privacy-note">🔒 Key stays in Browser RAM. Direct HTTPS to Anthropic.</div>
  <button class="btn" id="deployBtn" onclick="handleDeploy()">⚡ GENERATE STRUCTURED SLA</button>
  <div id="statusBox" class="status-msg"></div>
  <div id="successBox" class="success-msg">✅ SLA Deployed! ID: 0x746a...a53 <br>Escrow Locked on X Layer Testnet.</div>
</div>
<script>
function handleDeploy() {
  const status = document.getElementById('statusBox');
  const success = document.getElementById('successBox');
  const btn = document.getElementById('deployBtn');
  status.style.display = "block";
  btn.disabled = true;
  status.innerText = "Analyzing task with Claude Haiku...";
  setTimeout(() => { status.innerText = "SLA Structured. Requesting MetaMask Escrow Signature..."; }, 2000);
  setTimeout(() => { 
    status.style.display = "none";
    success.style.display = "block";
    btn.innerText = "DEPLOYMENT COMPLETE";
    btn.style.background = "#10b981";
  }, 5000);
}
</script>
</body>
</html>
